name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            binary_name: checkrpmkeys-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            binary_name: checkrpmkeys-linux-arm64

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Rust Toolchain setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture ${{ matrix.arch }}
          sudo apt-get update
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            sudo apt-get install -y pkg-config nettle-dev
          else
            sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config nettle-dev:arm64
          fi

      - name: Build
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkg-config' || '/usr/lib/x86_64-linux-gnu/pkg-config' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.arch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: |
          mkdir -p dist
          cargo build --release --target ${{ matrix.target }}

          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.binary_name }}.tar.gz checkrpmkeys
          sha256sum dist/${{ matrix.binary_name }}.tar.gz > dist/${{ matrix.binary_name }}.tar.gz.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.binary_name }}
          path: dist/*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Add to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
